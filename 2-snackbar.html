<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snackbar</title>

  <!-- iziToast CSS -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/izitoast/dist/css/iziToast.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/izitoast"></script>
  <script type="module" crossorigin src="/goit-js-hw-10/2-snackbar.js"></script>
  <link rel="modulepreload" crossorigin href="/goit-js-hw-10/assets/modulepreload-polyfill-B5Qt9EMX.js">
  <link rel="stylesheet" crossorigin href="/goit-js-hw-10/assets/styles-DgwNJSEA.css">
</head>
<body>
  <main>
    <div class="container">
      <h1 class="main-title">Snackbar</h1>
      <a class="back-link" href="./index.html">Go back</a>

      <form class="form">
        <label>
          Delay (ms)
          <input type="number" name="delay" min="0" required />
        </label>

        <fieldset>
          <legend>State</legend>
          <label>
            <input type="radio" name="state" value="fulfilled" required />
            Fulfilled
          </label>
          <label>
            <input type="radio" name="state" value="rejected" required />
            Rejected
          </label>
        </fieldset>

        <button type="submit">Create notification</button>
      </form>
    </div>
  </main>

  <!-- iziToast JS + мій скрипт -->
</body>
</html>
